image: php:8.1-cli

stages:
  - install_dependencies
  - test
  - deploy

# 1. INSTALACIÓN
install_deps:
  stage: install_dependencies
  script:
    - echo "Preparando el entorno para KitchenLink..."

# ==========================================================
# 2. TEST
# ==========================================================

lint-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando Linting (Sintaxis)..."
    - find . -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Sintaxis OK."

unit-test-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando Pruebas Unitarias..."
    - php -r "if (file_exists('src/php/db_connection.php')) { echo 'Test DB PASSED'; } else { echo 'Test DB FAILED'; exit(1); }"
    - |
      echo '<?xml version="1.0" encoding="UTF-8"?>
      <testsuites>
        <testsuite name="UnitTests" tests="1" failures="0">
          <testcase name="DatabaseConnectionFile"/>
        </testsuite>
      </testsuites>' > junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml

security-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Buscando archivos sensibles expuestos..."
    - find . -name "*.env" -o -name "*.sql" || echo "Análisis de seguridad completado."

phpunit-advanced-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando Suite de Pruebas PHPUnit..."
    - apt-get update && apt-get install -y git unzip zip
    - docker-php-ext-install mysqli
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd KitchenLink-Tests
    - composer install --no-interaction
    - ./vendor/bin/phpunit --testdox --log-junit report-phpunit.xml

  artifacts:
    when: always
    reports:
      junit: KitchenLink-Tests/report-phpunit.xml

# ==========================================================
# 3. DEPLOY
# ==========================================================

deploy_to_server:
  stage: deploy
  needs: ["lint-job", "unit-test-job", "security-job", "phpunit-advanced-job"]
  image: alpine:latest

  script:
    - apk update && apk add lftp curl

    - echo "🚀 Transfiriendo archivos al servidor de Adellya..."

    - >
      lftp -c "set ftp:ssl-allow no; set ftp:passive-mode true;
      open ftp://${FTP_USER}:${FTP_PASSWORD}@${FTP_HOST};
      mirror -R ./ htdocs/KitchenLink/
      --exclude-glob .git*
      --exclude .gitlab-ci.yml
      --exclude junit.xml;"

    - echo "🗄️ Ejecutando migración de base de datos..."

    - >
      curl -L
      --retry 5
      --retry-delay 5
      --connect-timeout 30
      --max-time 120
      "http://627.host.adellya.my.id/KitchenLink/src/php/deploy_db.php?token=KITCHENLINK_TOKEN_SECRETO_123"

    - echo "✅ Despliegue completado con éxito."

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'