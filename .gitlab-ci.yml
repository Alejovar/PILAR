# Imagen de PHP para las primeras etapas
image: php:8.1-cli

stages:
  - install_dependencies
  - quality_check
  - deploy

# ==========================================================
# 1. INSTALAR DEPENDENCIAS
# ==========================
install_deps:
  stage: install_dependencies
  script:
    - echo "Preparando entorno para KitchenLink..."
    - echo "✅ Entorno listo."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================================
# 2. ETAPA DE CALIDAD (Linting de todo el proyecto)
# ==========================
quality_check:
  stage: quality_check
  needs: ["install_deps"]
  script:
    - echo "Iniciando escaneo global de sintaxis PHP..."
    # Escanea todos los archivos .php. Si encuentra un error, el pipeline se detiene.
    - find . -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Sin errores de sintaxis detectados."
    
    - echo "Generando reporte JUnit para la interfaz de GitLab..."
    - echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="GlobalProjectTests" tests="1" failures="0"><testcase name="SyntaxValidation"/></testsuite></testsuites>' > junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================================
# 3. DESPLIEGUE REAL AL SERVIDOR (Solo archivos via FTP)
# ==========================
deploy_to_server:
  stage: deploy
  needs: ["quality_check"]
  image: alpine:latest
  script:
    - echo "Instalando herramientas de transferencia..."
    - apk update && apk add lftp
    
    - echo "🚀 Transfiriendo archivos al servidor de Adellya..."
    # Solo sube archivos. Ignora carpetas de Git y archivos de configuración del pipeline.
    - lftp -c "set ftp:ssl-allow no; set ftp:passive-mode true; open ftp://${FTP_USER}:${FTP_PASSWORD}@${FTP_HOST}; mirror -R ./ htdocs/KitchenLink/ --ignore-time --parallel=10 --exclude-glob .git* --exclude .gitlab-ci.yml;"
    
    - echo "✅ ¡Sitio web actualizado exitosamente!"
  only:
    - main