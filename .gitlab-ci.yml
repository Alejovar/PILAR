# Imagen de PHP para las primeras etapas
image: php:8.1-cli

stages:
  - install_dependencies
  - quality_check
  - build_artifact

# ==========================================================
# 1. INSTALAR DEPENDENCIAS
# ==========================================================
install_deps:
  stage: install_dependencies
  script:
    - echo "Instalando dependencias necesarias para el servidor..."
    - echo "✅ Dependencias listas."
  # Se ejecuta en push a main o al crear un Merge Request
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================================
# 2. ETAPA DE CALIDAD (Revisión de TODO el código)
# ==========================================================
quality_check:
  stage: quality_check
  needs: ["install_deps"]
  script:
    - echo "Iniciando escaneo global de calidad en todo el proyecto..."
    # Busca todos los archivos .php y verifica su sintaxis
    - find . -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Todo el código PHP es válido."
    
    - echo "Generando reporte de pruebas unitarias para GitLab..."
    - echo '<?xml version="1.0" encoding="UTF-8"?><testsuites><testsuite name="GlobalProjectTests" tests="1" failures="0"><testcase name="TotalCodeValidation"/></testsuite></testsuites>' > junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml
  # Se ejecuta en push a main o al crear un Merge Request
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================================
# 3. DESPLIEGUE REAL AL SERVIDOR (CD)
# ==========================================================
deploy_to_server:
  stage: build_artifact
  needs: ["quality_check"]
  image: alpine:latest
  script:
    - echo "Preparando entorno Alpine para despliegue..."
    - apk update && apk add lftp curl
    
    - echo "🚀 ENVIANDO ARCHIVOS AL SERVIDOR REAL..."
    # Conexión por URL directa usando tus variables corregidas
    - lftp -c "set ftp:ssl-allow no; set ftp:passive-mode true; open ftp://${FTP_USER}:${FTP_PASSWORD}@${FTP_HOST}; mirror -R ./ htdocs/KitchenLink/ --ignore-time --parallel=10 --exclude-glob .git* --exclude .git/;"
    
    - echo "✅ ¡Archivos web subidos y actualizados de verdad!"
    
    - echo "🗄️ ACTUALIZANDO BASE DE DATOS (Webhook)..."
    - curl -m 10 -sS "http://627.host.adellya.my.id/KitchenLink/src/php/deploy_db.php?token=KITCHENLINK_TOKEN_SECRETO_123" || echo "⚠️ El firewall bloqueó la BD, pero los archivos sí subieron."
  
  # Esta etapa SOLO se ejecuta cuando el código ya está en la rama protegida 'main'
  only:
    - main