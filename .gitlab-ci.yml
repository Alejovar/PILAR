image: php:8.1-cli

stages:
  - install_dependencies
  - test
  - deploy

# 1. INSTALAR DEPENDENCIAS
install_deps:
  stage: install_dependencies
  script:
    - echo "Preparando el entorno..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# 2. TRABAJO 1 DE LA ETAPA TEST: Revisión de Sintaxis
lint-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando Linting..."
    - find . -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Sintaxis OK."

# 2. TRABAJO 2 DE LA ETAPA TEST: Pruebas Unitarias
unit-test-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando Pruebas Unitarias..."
    - php -r "if (file_exists('src/php/db_connection.php')) { echo 'Test DB PASSED'; } else { echo 'Test FAILED'; }"
  artifacts:
    when: always
    reports:
      junit: junit.xml

# 3. DESPLIEGUE
deploy_to_server:
  stage: deploy
  needs: ["lint-job", "unit-test-job"]
  image: alpine:latest
  script:
    - apk update && apk add lftp
    - lftp -c "set ftp:ssl-allow no; set ftp:passive-mode true; open ftp://${FTP_USER}:${FTP_PASSWORD}@${FTP_HOST}; mirror -R ./ htdocs/KitchenLink/ --exclude-glob .git* --exclude .gitlab-ci.yml;"
  only:
    - main