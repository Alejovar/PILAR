image: php:8.1-cli

stages:
  - install_dependencies
  - test
  - build
  - deploy_staging
  - deploy_production

# ── 1. INSTALACIÓN ──
install_deps:
  stage: install_dependencies
  script:
    - echo "Preparando el entorno para KitchenLink..."

# ── 2. TESTS ──
lint-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Verificando sintaxis de todos los archivos PHP..."
    - find . -name "*.php" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Sintaxis OK."

unit-test-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando pruebas unitarias básicas..."
    - php -r "if (file_exists('src/php/db_connection.php')) { echo 'Test DB PASSED'; } else { echo 'Test DB FAILED'; exit(1); }"
    - |
      echo '<?xml version="1.0" encoding="UTF-8"?>
      <testsuites>
        <testsuite name="UnitTests" tests="1" failures="0">
          <testcase name="DatabaseConnectionFile"/>
        </testsuite>
      </testsuites>' > junit.xml
  artifacts:
    when: always
    reports:
      junit: junit.xml

security-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Buscando archivos sensibles expuestos..."
    - |
      if find . -maxdepth 1 -name "*.env" -o -name "*.sql" | grep -q .; then
        echo "❌ ERROR: Archivos sensibles (.env o .sql) detectados en la raíz!"
        exit 1
      else
        echo "✅ No se encontraron archivos sensibles."
      fi

phpunit-advanced-job:
  stage: test
  needs: ["install_deps"]
  script:
    - echo "Ejecutando suite de pruebas PHPUnit (~104 tests)..."
    - apt-get update && apt-get install -y git unzip zip libmariadb-dev
    - docker-php-ext-install mysqli
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd KitchenLink-Tests
    - composer install --no-interaction
    - ./vendor/bin/phpunit --testdox --log-junit report-phpunit.xml
  artifacts:
    when: always
    reports:
      junit: KitchenLink-Tests/report-phpunit.xml

# ── 3. BUILD ──
build_docker_image:
  stage: build
  needs: ["lint-job", "unit-test-job", "security-job", "phpunit-advanced-job"]
  image: docker:24
  services:
    - docker:24-dind
  script:
    - echo "🔨 Construyendo imagen Docker de KitchenLink..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── 4. DEPLOY A STAGING (CON VAULT) ──
deploy_to_staging:
  stage: deploy_staging
  needs: ["build_docker_image"]
  image: alpine:latest
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.com
  variables:
    VAULT_ADDR: "http://34.56.208.182:8200" 
  before_script:
    - apk add --no-cache openssh-client curl jq
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_VM_IP >> ~/.ssh/known_hosts
    
    # Obtener Token de Vault usando el JWT de GitLab
    - |
      export VAULT_TOKEN=$(curl -s --request POST \
        --data "{\"role\": \"gitlab-role\", \"jwt\": \"$VAULT_ID_TOKEN\"}" \
        $VAULT_ADDR/v1/auth/jwt/login | jq -r '.auth.client_token')
    
    # Obtener credenciales dinámicas de la DB
    - |
      export DB_CREDS=$(curl -s --header "X-Vault-Token: $VAULT_TOKEN" \
        $VAULT_ADDR/v1/database/creds/staging-role)
      export STAGING_DB_USER=$(echo $DB_CREDS | jq -r '.data.username')
      export STAGING_DB_PASSWORD=$(echo $DB_CREDS | jq -r '.data.password')

  script:
    - echo "🚀 Desplegando en STAGING ($STAGING_VM_IP) con usuario dinámico..."
    - ssh $VM_USER@$STAGING_VM_IP "mkdir -p ~/kitchenlink/docker"
    - scp docker-compose.yml $VM_USER@$STAGING_VM_IP:~/kitchenlink/docker-compose.yml
    - scp docker/init.sql    $VM_USER@$STAGING_VM_IP:~/kitchenlink/docker/init.sql
    - |
      ssh $VM_USER@$STAGING_VM_IP "
        set -e
        cd ~/kitchenlink
        # Inyectamos el usuario y pass dinámicos de Vault en el .env
        echo 'DB_ROOT_PASSWORD=${STAGING_DB_ROOT_PASSWORD}' >  .env
        echo 'DB_USER=${STAGING_DB_USER}'                  >> .env
        echo 'DB_PASSWORD=${STAGING_DB_PASSWORD}'           >> .env
        echo 'APP_IMAGE=${CI_REGISTRY_IMAGE}:latest'        >> .env

        docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
        docker pull ${CI_REGISTRY_IMAGE}:latest
        docker compose up -d --no-build
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── 5. DEPLOY A PRODUCCIÓN (CON VAULT) -
deploy_to_production:
  stage: deploy_production
  needs: ["deploy_to_staging"]
  image: alpine:latest
  id_tokens:
    VAULT_ID_TOKEN:
      aud: https://gitlab.com
  variables:
    VAULT_ADDR: "http://34.56.208.182:8200" 
  before_script:
    - apk add --no-cache openssh-client curl jq
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $VM_IP_ADDRESS >> ~/.ssh/known_hosts

    # Autenticación con Vault
    - |
      export VAULT_TOKEN=$(curl -s --request POST \
        --data "{\"role\": \"gitlab-role\", \"jwt\": \"$VAULT_ID_TOKEN\"}" \
        $VAULT_ADDR/v1/auth/jwt/login | jq -r '.auth.client_token')
    
    # Obtener credenciales de Producción
    - |
      export DB_CREDS=$(curl -s --header "X-Vault-Token: $VAULT_TOKEN" \
        $VAULT_ADDR/v1/database/creds/prod-role)
      export PROD_DB_USER=$(echo $DB_CREDS | jq -r '.data.username')
      export PROD_DB_PASSWORD=$(echo $DB_CREDS | jq -r '.data.password')

  script:
    - echo "🚀 Desplegando en PRODUCCIÓN ($VM_IP_ADDRESS)..."
    - ssh $VM_USER@$VM_IP_ADDRESS "mkdir -p ~/kitchenlink/docker"
    - scp docker-compose.yml $VM_USER@$VM_IP_ADDRESS:~/kitchenlink/docker-compose.yml
    - scp docker/init.sql    $VM_USER@$VM_IP_ADDRESS:~/kitchenlink/docker/init.sql
    - |
      ssh $VM_USER@$VM_IP_ADDRESS "
        set -e
        cd ~/kitchenlink
        echo 'DB_ROOT_PASSWORD=${PROD_DB_ROOT_PASSWORD}' >  .env
        echo 'DB_USER=${PROD_DB_USER}'                    >> .env
        echo 'DB_PASSWORD=${PROD_DB_PASSWORD}'             >> .env
        echo 'APP_IMAGE=${CI_REGISTRY_IMAGE}:latest'       >> .env

        docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
        docker pull ${CI_REGISTRY_IMAGE}:latest
        docker compose up -d --no-build
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual