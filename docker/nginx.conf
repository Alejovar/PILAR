worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name _;

        root  /var/www/html;
        index index.php index.html;

        # ── Archivos estáticos normales ──
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
            expires 7d;
            access_log off;
        }

        # ── Modelos de face-api.js (archivos sin extensión en /src/face-models/) ──
        # Los pesos del modelo son archivos binarios sin extensión (.json sí tiene,
        # pero los shards no). Nginx los sirve como octet-stream por el default_type
        # de arriba, pero hay que asegurarse de que no intente pasarlos a PHP-FPM.
        location ^~ /src/face-models/ {
            # Deshabilitar PHP-FPM para esta ruta
            try_files $uri =404;
            # Cache agresivo: los modelos no cambian entre deploys
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # ── Rutas normales ──
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── PHP-FPM ──
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }

        # ── Bloquear archivos sensibles ──
        location ~ /\.(git|env|htaccess) {
            deny all;
        }
    }
}
