worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name _;

        root  /var/www/html;
        index index.php index.html;

        # Archivos estáticos: CSS, JS, imágenes, fuentes
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
            expires 7d;
            access_log off;
        }

        # Rutas normales: busca el archivo; si no existe lo manda a index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pasar archivos .php a PHP-FPM
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }

        # Bloquear acceso directo a archivos sensibles
        location ~ /\.(git|env|htaccess) {
            deny all;
        }
    }
}
