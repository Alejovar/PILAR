services:
  # ── Base de datos MySQL 
  db:
    image: mysql:8.0
    container_name: kitchenlink-db
    restart: unless-stopped
    # ESTO ES LO QUE PERMITE QUE VAULT SE CONECTE DESDE AFUERA:
    ports:
      - "3306:3306"
    environment:
      # IMPORTANTE: Vault usará el ROOT_PASSWORD para entrar y crear los usuarios temporales
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: KitchenLink
      # Usuario por defecto para el primer arranque
      MYSQL_USER: ${DB_USER:-KitchenLink}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      # El healthcheck ahora usa el usuario dinámico para validar la conexión
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ── Aplicación PHP + Nginx 
  app:
    image: ${APP_IMAGE:-kitchenlink-app}
    build: .
    container_name: kitchenlink-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: db           
      # Aquí es donde ocurre la magia: PHP recibirá el usuario de Vault
      DB_USER: ${DB_USER:-KitchenLink}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: KitchenLink
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: