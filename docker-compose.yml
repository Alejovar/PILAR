services:
  db:
    image: mysql:8.0
    container_name: kitchenlink-db
    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: KitchenLink
      MYSQL_USER: ${DB_USER:-roceel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  app:
    image: ${APP_IMAGE:-roceel-app}
    build: .
    container_name: kitchenlink-app
    restart: unless-stopped

    ports:
      - "80:80"

    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-roceel_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: KitchenLink

    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: